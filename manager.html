<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Question Bank Manager

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<!--======================================================
Navigation
=======================================================-->

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a
class="navbar-brand"
href="index.html">

AI Question Paper Generator v2.0

</a>

</div>

</nav>

<!--======================================================
Main Container
=======================================================-->

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>

Question Bank Manager

</h3>

</div>

<div class="card-body">

<p>

Manage, Search, Edit and Organize your Question Bank.

</p>

<hr>

<!--==============================================
Statistics
===============================================-->

<div class="row text-center mb-4">

<div class="col-md-3">

<div class="card">

<div class="card-body">

<h5>Total Questions</h5>

<h2 id="totalQuestions">

0

</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card">

<div class="card-body">

<h5>Chapters</h5>

<h2 id="totalChapters">

0

</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card">

<div class="card-body">

<h5>Subjects</h5>

<h2 id="totalSubjects">

0

</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card">

<div class="card-body">

<h5>Marks Types</h5>

<h2>

5

</h2>

</div>

</div>

</div>

</div>
<!--==============================================
Search & Filters
===============================================-->

<div class="row mb-4">

<div class="col-md-4">

<input
type="text"
id="searchBox"
class="form-control"
placeholder="Search Question...">

</div>

<div class="col-md-2">

<select
id="chapterFilter"
class="form-select">

<option value="">

All Chapters

</option>

</select>

</div>

<div class="col-md-2">

<select
id="marksFilter"
class="form-select">

<option value="">

All Marks

</option>

<option value="1">

1 Mark

</option>

<option value="2">

2 Marks

</option>

<option value="3">

3 Marks

</option>

<option value="4">

4 Marks

</option>

<option value="5">

5 Marks

</option>

</select>

</div>

<div class="col-md-2">

<select
id="typeFilter"
class="form-select">

<option value="">

All Types

</option>

<option value="Theory">

Theory

</option>

<option value="MCQ">

MCQ

</option>

<option value="Programming">

Programming

</option>

<option value="SQL">

SQL

</option>

<option value="Case Study">

Case Study

</option>

<option value="Assertion-Reason">

Assertion-Reason

</option>

</select>

</div>

<div class="col-md-2">

<select
id="difficultyFilter"
class="form-select">

<option value="">

All Difficulty

</option>

<option value="Easy">

Easy

</option>

<option value="Medium">

Medium

</option>

<option value="Hard">

Hard

</option>

</select>

</div>

</div>

<!--==============================================
Action Buttons
===============================================-->

<div class="mb-4">

<button
class="btn btn-success"
id="addQuestionBtn">

Add Question

</button>

<button
class="btn btn-primary ms-2"
id="refreshBtn">

Refresh

</button>

<button
class="btn btn-warning ms-2"
id="exportBtn">

Export QB

</button>

<button
class="btn btn-danger ms-2"
id="deleteAllBtn">

Delete All

</button>

</div>
<!--==============================================
Question Bank Table
===============================================-->

<div class="table-responsive">

<table
class="table table-bordered table-hover align-middle"
id="questionTable">

<thead class="table-dark">

<tr>

<th style="width:60px">

#

</th>

<th>

Chapter

</th>

<th style="width:90px">

Marks

</th>

<th style="width:140px">

Type

</th>

<th>

Question

</th>

<th style="width:120px">

Difficulty

</th>

<th style="width:170px">

Actions

</th>

</tr>

</thead>

<tbody id="questionTableBody">

<tr>

<td colspan="7" class="text-center text-muted">

No Questions Available

</td>

</tr>

</tbody>

</table>

</div>

<!--==============================================
Pagination
===============================================-->

<div
class="d-flex justify-content-between align-items-center mt-3">

<div>

Showing

<span id="showingCount">

0

</span>

Questions

</div>

<div>

<button
class="btn btn-outline-primary btn-sm"
id="previousPage">

Previous

</button>

<span
class="mx-3"
id="pageNumber">

Page 1

</span>

<button
class="btn btn-outline-primary btn-sm"
id="nextPage">

Next

</button>

</div>
<!--==============================================
Add / Edit Question Modal
===============================================-->

<div
class="modal fade"
id="questionModal"
tabindex="-1">

<div class="modal-dialog modal-xl">

<div class="modal-content">

<div class="modal-header bg-primary text-white">

<h5
class="modal-title"
id="modalTitle">

Add Question

</h5>

<button
type="button"
class="btn-close btn-close-white"
data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body">

<div class="row">

<div class="col-md-6">

<label class="form-label">

Subject

</label>

<input
type="text"
id="subjectInput"
class="form-control">

</div>

<div class="col-md-6">

<label class="form-label">

Chapter

</label>

<input
type="text"
id="chapterInput"
class="form-control">

</div>

</div>

<div class="row mt-3">

<div class="col-md-4">

<label class="form-label">

Marks

</label>

<select
id="marksInput"
class="form-select">

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>

</select>

</div>

<div class="col-md-4">

<label class="form-label">

Question Type

</label>

<select
id="typeInput"
class="form-select">

<option>Theory</option>

<option>MCQ</option>

<option>Programming</option>

<option>SQL</option>

<option>Case Study</option>

<option>Assertion-Reason</option>

</select>

</div>

<div class="col-md-4">

<label class="form-label">

Difficulty

</label>

<select
id="difficultyInput"
class="form-select">

<option>Easy</option>

<option>Medium</option>

<option>Hard</option>

</select>

</div>

</div>

<div class="mt-3">

<label class="form-label">

Question

</label>

<textarea
id="questionInput"
class="form-control"
rows="6">

</textarea>

</div>

<div class="mt-3">

<label class="form-label">

Answer (Optional)

</label>

<textarea
id="answerInput"
class="form-control"
rows="4">

</textarea>

</div>

</div>

<div class="modal-footer">

<button
type="button"
class="btn btn-secondary"
data-bs-dismiss="modal">

Cancel

</button>

<button
type="button"
class="btn btn-success"
id="saveQuestionBtn">

Save Question

</button>

</div>

</div>

</div>

</div>
  </div>

</div>

</div>

<!--==============================================
Bootstrap
===============================================-->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!--==============================================
Project JavaScript Files
===============================================-->

<script src="js/storage.js"></script>

<script src="js/manager.js"></script>
<script src="js/main.js"></script>


</script>

</body>

</html>
</div>

<hr>
